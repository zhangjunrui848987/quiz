<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER_AI 核心控制台</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    
    /* 高科技頂部導覽列 */
    .header { background: #161b22; padding: 15px; border-bottom: 2px solid #58a6ff; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(88,166,255,0.1); }
    .header h1 { font-size: 18px; color: #58a6ff; font-weight: bold; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
    .status-tag { background: rgba(56, 139, 253, 0.15); color: #58a6ff; font-size: 11px; padding: 4px 8px; border-radius: 12px; border: 1px solid rgba(56, 139, 253, 0.4); text-transform: uppercase; font-weight: bold; }

    /* 設定區：輸入金鑰與知識庫 */
    .setup-panel { background: #161b22; padding: 15px; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #30363d; font-size: 13px; }
    .input-row { display: flex; gap: 10px; align-items: center; }
    .input-row label { width: 85px; color: #8b949e; font-weight: bold; }
    .setup-panel input, .setup-panel textarea { flex: 1; background: #0d1117; border: 1px solid #30363d; padding: 8px 12px; border-radius: 6px; color: #c9d1d9; outline: none; font-family: inherit; }
    .setup-panel input:focus, .setup-panel textarea:focus { border-color: #58a6ff; }
    .setup-panel textarea { height: 60px; resize: none; }

    /* 聊天訊息主視窗 */
    .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; background: radial-gradient(circle at center, #11161d 0%, #0d1117 100%); }
    .msg-row { display: flex; flex-direction: column; max-width: 85%; }
    .msg-row.user { align-self: flex-end; align-items: flex-end; }
    .msg-row.ai { align-self: flex-start; align-items: flex-start; }
    
    .sender-name { font-size: 11px; color: #8b949e; margin-bottom: 4px; padding: 0 4px; font-weight: bold; }
    .bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-break: break-all; white-space: pre-wrap; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .user .bubble { background: #1f6feb; color: #ffffff; border-bottom-right-radius: 2px; }
    .ai .bubble { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-bottom-left-radius: 2px; }
    
    /* 載入中動畫 */
    .loading-bubble { display: flex; gap: 4px; padding: 12px 16px; background: #21262d; border-radius: 12px; border: 1px solid #30363d; align-items: center; }
    .dot { width: 6px; height: 6px; background: #58a6ff; border-radius: 50%; animation: blink 1.4s infinite both; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%, 100% { opacity: .2; } 20% { opacity: 1; } }

    /* 底部輸入欄 */
    .input-panel { background: #161b22; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #30363d; }
    .input-panel input { flex: 1; background: #0d1117; border: 1px solid #30363d; padding: 12px 16px; border-radius: 24px; color: #c9d1d9; outline: none; font-size: 14px; transition: border 0.2s; }
    .input-panel input:focus { border-color: #58a6ff; }
    .input-panel button { background: #238636; color: white; border: none; padding: 0 24px; border-radius: 24px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s; }
    .input-panel button:hover { background: #2ea043; }
</style>
</head>
<body>

    <!-- 頂部列 -->
    <div class="header">
        <h1>⚡ CYBER_AI 智慧終端</h1>
        <div class="status-tag" id="statusTag">系統就緒</div>
    </div>
    
    <!-- RAG 知識庫設定區（高科技核心） -->
    <div class="setup-panel">
        <div class="input-row">
            <label>🔑 Gemini 金鑰</label>
            <input type="password" id="apiKeyInput" placeholder="請貼上您的免費 Gemini API Key...">
        </div>
        <div class="input-row">
            <label>📚 精準知識庫</label>
            <textarea id="knowledgeInput" placeholder="在此輸入您要交給 AI 遵循的正確資料、標準答案、歷史檔案或規範...（填入後 AI 回答會絕對精準！）">【範例知識庫：正義大樓管理規則】
1. 本大樓開放時間為每日早上6點至晚上10點。
2. 垃圾集中場位於地下的一樓（B1），每日晚上8點會進行清運。
3. 訪客進入必須在管理室登記，且晚上9點後謝絕訪客進出。
4. 管理室聯絡電話為：07-1234567。</textarea>
        </div>
    </div>

    <!-- 聊天對話窗 -->
    <div class="chat-container" id="chatBox">
        <div class="msg-row ai">
            <div class="sender-name">SYSTEM_AI</div>
            <div class="bubble">歡迎使用精準型 AI 終端。請先在上方填寫您的免費 API Key。您可以將任何標準答案填入「精準知識庫」中，我將百分之百遵循該資料進行邏輯推導與回覆！</div>
        </div>
    </div>

    <!-- 底部打字輸入 -->
    <div class="input-panel">
        <input type="text" id="userInput" placeholder="請輸入您的問題..." autocomplete="off">
        <button id="sendBtn">發送指令</button>
    </div>

    <script>
        const chatBox = document.getElementById("chatBox");
        const userInput = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");
        const apiKeyInput = document.getElementById("apiKeyInput");
        const knowledgeInput = document.getElementById("knowledgeInput");
        const statusTag = document.getElementById("statusTag");

        // 從瀏覽器快取自動抓取上次存過的金鑰，免重複輸入
        if(localStorage.getItem("gemini_key")) {
            apiKeyInput.value = localStorage.getItem("gemini_key");
        }

        async function handleSend() {
            const prompt = userInput.value.trim();
            const apiKey = apiKeyInput.value.trim();
            const knowledge = knowledgeInput.value.trim();

            if (!prompt) return;
            if (!apiKey) {
                alert("請先輸入您的 Gemini API Key！");
                return;
            }

            // 儲存金鑰到快取
            localStorage.setItem("gemini_key", apiKey);

            // 1. 渲染使用者訊息
            appendMessage(prompt, "user", "YOU");
            userInput.value = "";

            // 2. 顯示 AI 載入中動畫
            const loadingEl = showLoading();
            statusTag.innerText = "計算中...";
            statusTag.style.color = "#e3b341";

            // 3. 核心邏輯：將「知識庫」與「使用者的問題」打包融合，強制 AI 進行精準檢索
            const rragPrompt = `你是一個極度精準、絕對不胡說八道的專業 AI 助手。
請完全根據以下提供的【精準知識庫】內容來回答使用者的問題。如果知識庫中沒有相關資訊，請委婉地回答「抱歉，根據目前的知識庫資料無法提供此答案」，絕對不能自行編造、幻想任何事實。

【精準知識庫內容】：
${knowledge}

【使用者的問題】：
${prompt}`;

            try {
                // 4. 串接 Google 官方最新的免費大模型介面 (Gemini 2.5 Flash)
                const response = await fetch(`https://googleapis.com{apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: rragPrompt }] }]
                    })
                });

                const data = await response.json();
                loadingEl.remove(); // 移除動畫

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    appendMessage(aiReply, "ai", "CYBER_AI");
                    statusTag.innerText = "系統就緒";
                    statusTag.style.color = "#58a6ff";
                } else {
                    throw new Error("回傳格式異常");
                }

            } catch (error) {
                console.error(error);
                loadingEl.remove();
                appendMessage("❌ 聯絡核心主機失敗。請檢查您的 API Key 是否正確，或確認您的網路連線。", "ai", "SYSTEM_ERROR");
                statusTag.innerText = "連線錯誤";
                statusTag.style.color = "#f85149";
            }
        }

        function appendMessage(text, sender, name) {
            const row = document.createElement("div");
            row.classList.add("msg-row", sender);
            row.innerHTML = `
                <div class="sender-name">${name}</div>
                <div class="bubble">${escapeHtml(text)}</div>
            `;
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showLoading() {
            const row = document.createElement("div");
            row.classList.add("msg-row", "ai");
            row.innerHTML = `
                <div class="sender-name">CYBER_AI</div>
                <div class="loading-bubble">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            `;
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
            return row;
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        sendBtn.addEventListener("click", handleSend);
        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });
    </script>
</body>
</html>
